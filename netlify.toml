[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Same-origin proxy to the deployed BlueMonk backend.
# Implemented as an Edge Function (not a plain redirect) so we can strip
# Origin / Referer / Cookie before forwarding — the deployed backend sits
# behind GCP Cloud Armor, which 403s requests that look like they
# originated from an unknown browser origin.
[[edge_functions]]
  function = "api-proxy"
  path = "/api/*"

# SPA fallback so client-side routes resolve on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
