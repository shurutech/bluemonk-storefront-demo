[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Same-origin proxy to the deployed BlueMonk backend.
# Browser only sees Netlify origin, so no CORS preflight is sent;
# Netlify forwards the request server-to-server with X-API-Key intact.
[[redirects]]
  from = "/api/*"
  to = "https://demo.bluemonk.shurutech.com/:splat"
  status = 200
  force = true

# SPA fallback so client-side routes resolve on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
